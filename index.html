<script>
    let cart = [];
    const WA_NUMBER = '6281234567890'; // GANTI NOMOR WA LO

    function addToCart(name, price) {
        const existing = cart.find(item => item.name === name);
        if (existing) {
            existing.qty += 1;
        } else {
            cart.push({ name, price, qty: 1 });
        }
        updateCart();
        
        const badge = document.getElementById('cart-count');
        badge.classList.add('cart-badge');
        setTimeout(() => badge.classList.remove('cart-badge'), 300);
    }

    function removeFromCart(name) {
        cart = cart.filter(item => item.name !== name);
        updateCart();
    }

    function updateQty(name, change) {
        const item = cart.find(item => item.name === name);
        if (item) {
            item.qty += change;
            if (item.qty <= 0) removeFromCart(name);
        }
        updateCart();
    }

    function clearCart() {
        cart = [];
        updateCart();
    }

    function updateCart() {
        const cartCount = document.getElementById('cart-count');
        const cartItems = document.getElementById('cart-items');
        const cartTotal = document.getElementById('cart-total');
        
        const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
        const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        
        if (totalQty > 0) {
            cartCount.textContent = totalQty;
            cartCount.classList.remove('hidden');
        } else {
            cartCount.classList.add('hidden');
        }
        
        if (cart.length === 0) {
            cartItems.innerHTML = '<p class="text-center text-slate-400 py-12">Keranjang masih kosong</p>';
        } else {
            cartItems.innerHTML = cart.map(item => `
                <div class="flex gap-4 bg-cream p-3 rounded-xl">
                    <div class="flex-1">
                        <h4 class="font-bold text-coklat text-sm">${item.name}</h4>
                        <p class="text-brand-600 font-bold">Rp${item.price.toLocaleString('id-ID')}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="updateQty('${item.name}', -1)" class="w-7 h-7 bg-white border border-slate-300 rounded-full flex items-center justify-center hover:bg-slate-100">
                            <i class="fa-solid fa-minus text-xs"></i>
                        </button>
                        <span class="font-bold w-6 text-center">${item.qty}</span>
                        <button onclick="updateQty('${item.name}', 1)" class="w-7 h-7 bg-brand-500 text-white rounded-full flex items-center justify-center hover:bg-brand-600">
                            <i class="fa-solid fa-plus text-xs"></i>
                        </button>
                        <button onclick="removeFromCart('${item.name}')" class="w-7 h-7 text-red-500 hover:bg-red-50 rounded-full flex items-center justify-center">
                            <i class="fa-solid fa-trash text-xs"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        cartTotal.textContent = `Rp${totalPrice.toLocaleString('id-ID')}`;
    }

    function toggleCart() {
        const modal = document.getElementById('cart-modal');
        modal.classList.toggle('hidden');
        document.body.style.overflow = modal.classList.contains('hidden') ? '' : 'hidden';
    }

    function checkoutWA() {
        if (cart.length === 0) {
            alert('Keranjang masih kosong Mas Bro!');
            return;
        }
        
        let message = `Halo Dapur Bunda! 👋%0A%0ASaya mau pesan:%0A`;
        let total = 0;
        
        cart.forEach((item, index) => {
            const subtotal = item.price * item.qty;
            total += subtotal;
            message += `${index + 1}. ${item.name} x${item.qty} = Rp${subtotal.toLocaleString('id-ID')}%0A`;
        });
        
        message += `%0A*Total: Rp${total.toLocaleString('id-ID')}*%0A%0AMohon info untuk pengiriman ya. Terima kasih 🙏`;
        
        const waUrl = `https://wa.me/${WA_NUMBER}?text=${message}`;
        window.open(waUrl, '_blank');
    }

    // Tutup modal kalo pencet ESC
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            document.getElementById('cart-modal').classList.add('hidden');
            document.body.style.overflow = '';
        }
    });
</script>
</body>
</html>
